name: Matrix Builds

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: ${{ matrix.os }}
        strategy:
          fail-fast: true
          matrix:
            os: [ubuntu-latest, windows-latest]
            python-version: ["3.10", "3.11", "3.12"]
            exclude:
              - os: windows-latest
                python-version: "3.10"
              
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup python
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version }}

            - name: print python version
              run: python --version

            - name: Force failure on Python 3.11 (demo)
              if: matrix.python-version == '3.11'
              run: exit 1